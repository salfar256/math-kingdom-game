<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Masuk Siswa — Pertarungan Empat Kerajaan Hitungan</title>
  <meta name="theme-color" content="#172033" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/png" href="./assets/icons/favicon-32.png" />
  <link rel="stylesheet" href="./css/fonts.css" />

  <link rel="stylesheet" href="./css/variables.css" />
  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/game.css" />
  <link rel="stylesheet" href="./css/responsive.css" />
</head>
<body>
  <a class="skip-link" href="#main">Lompat ke konten utama</a>

  <div class="page">
    <main id="main" class="container container--narrow stack-lg" style="padding-top: 24px;">

      <header class="text-center">
        <a href="./index.html" class="text-sm">← Kembali</a>
        <h1>Masuk Siswa</h1>
        <p class="text-muted">Isi nama panggilan dan kode kelas dari gurumu.</p>
      </header>

      <div id="global-error" class="form-error" hidden role="alert"></div>

      <div class="panel panel--tight" id="resume-box" hidden>
        <p class="text-sm" style="margin:0 0 8px;">Kamu masih masuk sebagai <strong id="resume-name">-</strong>.</p>
        <button type="button" class="btn btn--success btn--block" id="btn-resume">Lanjutkan Petualangan</button>
      </div>

      <div class="mode-tabs" role="tablist" aria-label="Mode masuk">
        <button type="button" class="mode-tab" id="tab-register" role="tab" aria-selected="true">Akun Baru</button>
        <button type="button" class="mode-tab" id="tab-login" role="tab" aria-selected="false">Sudah Punya Akun</button>
      </div>

      <form id="student-form" class="panel stack" novalidate>

        <div class="field">
          <label class="label" for="nickname">Nama panggilan</label>
          <input
            class="input" type="text" id="nickname" name="nickname"
            placeholder="Contoh: Rani" maxlength="30"
            autocomplete="nickname" required
            aria-describedby="nickname-error" />
          <span class="field-error" id="nickname-error" hidden></span>
        </div>

        <div class="field">
          <label class="label" for="classcode">Kode kelas</label>
          <input
            class="input input--code" type="text" id="classcode" name="classcode"
            placeholder="ABC123" maxlength="10"
            autocomplete="off" autocapitalize="characters" spellcheck="false" required
            aria-describedby="classcode-error" />
          <span class="field-error" id="classcode-error" hidden></span>
        </div>

        <div class="field">
          <label class="label" for="pin">PIN rahasia (6 angka)</label>
          <input
            class="input input--code" type="password" id="pin" name="pin"
            placeholder="******" maxlength="6" inputmode="numeric" pattern="[0-9]*"
            autocomplete="off" required
            aria-describedby="pin-error pin-hint" />
          <span class="text-xs text-dim" id="pin-hint">Ingat PIN ini untuk masuk kembali ke akunmu.</span>
          <span class="field-error" id="pin-error" hidden></span>
        </div>

        <fieldset class="field" id="character-fieldset" style="border: none; padding: 0; margin: 0;">
          <legend class="label">Pilih karakter</legend>
          <div class="character-grid" id="character-grid" role="group" aria-label="Pilihan karakter"></div>
          <span class="field-error" id="character-error" hidden></span>
        </fieldset>

        <button type="submit" class="btn btn--primary btn--block btn--lg" id="btn-start">
          <img class="icon-img" src="./assets/icons/sword.png" width="18" height="18" alt="" aria-hidden="true"> Mulai Petualangan
        </button>

      </form>

      <p class="text-sm text-dim text-center">
        Progresmu tersimpan di akunmu. Masuk dengan nama, kode kelas, dan PIN
        yang sama dari perangkat mana pun.
      </p>

    </main>
  </div>

  <script type="module" src="./js/pages/student-login-page.js"></script>
</body>
</html>
