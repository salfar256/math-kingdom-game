<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Pertarungan Empat Kerajaan Hitungan</title>
  <meta name="description" content="Game pendidikan matematika dasar untuk siswa kelas 7 SMP. Latihan 10–15 menit setiap hari selama 30 hari." />
  <meta name="theme-color" content="#172033" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" type="image/png" href="./assets/icons/favicon-32.png" />
  <link rel="stylesheet" href="./css/fonts.css" />

  <link rel="stylesheet" href="./css/variables.css" />
  <link rel="stylesheet" href="./css/global.css" />
  <link rel="stylesheet" href="./css/components.css" />
  <link rel="stylesheet" href="./css/menu.css" />
</head>
<body class="menu-body">
  <a class="skip-link" href="#main">Lompat ke konten utama</a>

  <!-- Filter gelombang halus untuk latar (SMIL, dinonaktifkan oleh reduce-motion lewat CSS) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="menu-wave" x="-5%" y="-5%" width="110%" height="110%">
      <feTurbulence type="fractalNoise" baseFrequency="0.004 0.009" numOctaves="1" seed="7" result="noise">
        <animate attributeName="baseFrequency" dur="14s" repeatCount="indefinite"
                 values="0.004 0.009; 0.006 0.012; 0.004 0.009" />
      </feTurbulence>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="7" xChannelSelector="R" yChannelSelector="G" />
    </filter>
  </svg>

  <main id="main" class="menu-frame" aria-label="Menu utama Pertarungan Empat Kerajaan Hitungan">
    <div class="menu-bg" aria-hidden="true"></div>
    <div class="menu-fog" aria-hidden="true"></div>
    <div class="menu-vignette" aria-hidden="true"></div>

    <div id="firebase-warning" class="form-error" hidden></div>

    <!-- Tombol utama (tepat di atas tombol yang tergambar) -->
    <a class="menu-hotspot menu-hotspot--battle" href="./student.html">
      Mulai Pertarungan — Masuk Siswa
    </a>
    <a class="menu-hotspot menu-hotspot--map" href="./game.html">
      Peta Kerajaan
    </a>
    <a class="menu-hotspot menu-hotspot--daily" href="./game.html">
      Tantangan Harian
    </a>
    <a class="menu-hotspot menu-hotspot--profile" href="./profile.html">
      Profil
    </a>
    <button type="button" class="menu-hotspot menu-hotspot--shop" id="btn-shop">
      Toko
    </button>
    <a class="menu-hotspot menu-hotspot--badges" href="./profile.html">
      Achievement
    </a>

    <!-- Roda gigi kanan-atas: pengaturan suara & tampilan -->
    <button type="button" class="menu-hotspot menu-hotspot--gear" id="btn-sound"
            aria-label="Pengaturan suara dan tampilan">
      Pengaturan
    </button>

    <!-- Navigasi bawah -->
    <nav aria-label="Navigasi bawah">
      <a class="menu-hotspot menu-hotspot--nav menu-hotspot--nav-1" href="./index.html" aria-current="page">
        Beranda
      </a>
      <a class="menu-hotspot menu-hotspot--nav menu-hotspot--nav-2" href="./student.html">
        Bertarung
      </a>
      <button type="button" class="menu-hotspot menu-hotspot--nav menu-hotspot--nav-3" id="btn-about">
        Belajar
      </button>
      <a class="menu-hotspot menu-hotspot--nav menu-hotspot--nav-4" href="./teacher.html">
        Kelas — Masuk Guru
      </a>
      <a class="menu-hotspot menu-hotspot--nav menu-hotspot--nav-5" href="./game.html">
        Ranking
      </a>
    </nav>

  </main>

  <script type="module" src="./js/pages/landing-page.js"></script>
</body>
</html>
